name: Auto-merge

# P1 scaffolding ONLY: enables GitHub native auto-merge on agent PRs so they
# land when required checks pass. Replaced by the deterministic Supervisor's
# sequential merge algorithm at P3 (architecture v6.4.1 §5.5).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    # Same-repo agent branches or explicitly labeled PRs only. Fork PRs get a
    # read-only token and are out of scope for P1 anyway.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.head_ref, 'codex/') ||
       contains(github.event.pull_request.labels.*.name, 'automerge'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
